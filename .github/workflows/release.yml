name: Release Penta OS

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push container images
        run: make containers
        env:
          DOCKER_TAG: ${{ github.ref_name }}

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y debootstrap btrfs-progs qemu-user-static binfmt-support \
            systemd-container curl wget git make gcc-aarch64-linux-gnu parted kpartx rsync

      - name: Build OS image (arm64)
        run: sudo make image ARCH=arm64

      - name: Build OS image (amd64)
        run: sudo make image ARCH=amd64

      - name: Generate checksums
        run: |
          cd output
          sha256sum *.img.xz > SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Penta OS ${{ github.ref_name }}
          body: |
            Release ${{ github.ref_name }} of Penta OS.

            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: |
            output/*.img.xz
            output/SHA256SUMS
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
