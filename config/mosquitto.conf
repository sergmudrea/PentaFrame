# Mosquitto MQTT Broker Configuration for Penta OS
# Lightweight config for local development and single-node use.

# Basic listener (no TLS for localhost; use TLS in production)
listener 1883 localhost

# Allow anonymous connections for development
# In production, set up username/password and disable anonymous
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections 100
